<style>

    --border:#e2e8f0; --blight:#f1f5f9;

  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html { -webkit-text-size-adjust:100%; scroll-behavior:smooth; }

  .header { display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:12px; margin-bottom:20px; }
  .header-label { font-size:10px; font-weight:700; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:2px; }
  .header h1 { font-size:22px; font-weight:800; margin:0; }
  .header-sub { font-size:11px; color:var(--mute); margin-top:2px; }

  .type-filters { display:flex; gap:6px; }
  .type-btn { padding:6px 14px; border-radius:8px; font-size:12px; cursor:pointer; border:1.5px solid var(--border); background:#fff; color:var(--mute); font-weight:500; transition:all .15s; }
  .type-btn.active-total { background:#eff6ff; color:var(--accent); border-color:var(--accent); font-weight:700; }
  .type-btn.active-legacy { background:#ecfeff; color:var(--cyan); border-color:var(--cyan); font-weight:700; }
  .type-btn.active-tuning { background:#f5f3ff; color:var(--purple); border-color:var(--purple); font-weight:700; }

  .bu-nav { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px; align-items:center; }
  .bu-label { font-size:10px; color:var(--mute); font-weight:700; }
  .bu-btn { padding:5px 12px; border-radius:7px; font-size:12px; cursor:pointer; border:1px solid var(--border); background:#fff; color:var(--dim); font-weight:500; transition:all .15s; }
  .bu-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); font-weight:700; }

  .of-nav { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:16px; align-items:center; }
  .of-nav:empty { margin-bottom:0; }
  .of-label { font-size:10px; color:var(--mute); font-weight:700; }
  .of-btn { padding:4px 10px; border-radius:6px; font-size:11px; cursor:pointer; border:1px solid var(--border); background:#fff; color:var(--dim); font-weight:500; transition:all .15s; }
  .of-btn.active { background:#0891b2; color:#fff; border-color:#0891b2; font-weight:700; }

  .kpi-row { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
  .kpi { background:#fff; border-radius:12px; padding:16px 20px; border:1px solid var(--border); flex:1; min-width:155px; box-shadow:0 1px 3px rgba(0,0,0,.04); }
  .kpi-label { font-size:10px; font-weight:700; color:var(--mute); text-transform:uppercase; letter-spacing:1.2px; margin-bottom:6px; }
  .kpi-value { font-size:28px; font-weight:800; line-height:1.1; }
  .kpi-sub { font-size:11px; color:var(--dim); margin-top:4px; }
  .kpi-delta { font-size:11px; font-weight:700; margin-top:4px; }
  .kpi-delta.up { color:var(--green); }
  .kpi-delta.down { color:var(--red); }

  .tabs { display:flex; gap:2px; margin-bottom:18px; border-bottom:2px solid var(--border); }
  .tab-btn { padding:9px 18px; font-size:13px; cursor:pointer; background:transparent; border:none; border-bottom:2px solid transparent; color:var(--mute); font-weight:500; margin-bottom:-2px; transition:all .15s; }

  .card-title { font-size:14px; font-weight:700; margin-bottom:14px; }
  .card-title-sm { font-size:13px; font-weight:700; margin-bottom:14px; }

  th { padding:8px 8px; text-align:center; color:var(--mute); font-weight:600; font-size:10px; background:#f8fafc; }
  th.left { text-align:left; padding-left:14px; }
  td { padding:7px 8px; text-align:center; }
  tr.row-border { border-bottom:1px solid var(--blight); }
  tr.alt { background:#fafbfc; }
  tr.total-row { background:#f8fafc; }
  .td-left { text-align:left; padding-left:14px; }

  .badge { display:inline-block; padding:2px 7px; border-radius:5px; font-size:10px; font-weight:800; }

  .badge-A { color:#3b82f6; background:#eff6ff; }
  .badge-Bp { color:#334155; background:#f1f5f9; }
  .badge-B { color:#475569; background:#f8fafc; }
  .badge-C { color:#dc2626; background:#fef2f2; }

  .rate-S { color:#2563eb; background:#dbeafe; font-weight:700; border-radius:3px; }
  .rate-A { color:#3b82f6; background:#eff6ff; font-weight:700; border-radius:3px; }
  .rate-Bp { color:#334155; background:#f1f5f9; font-weight:700; border-radius:3px; }

  .flex-col { display:flex; flex-direction:column; gap:16px; }

  .rank-num { width:18px; height:18px; border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:800; flex-shrink:0; }
  .rank-name { flex:1; font-size:11px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .rank-bu { font-size:9px; color:var(--mute); flex-shrink:0; }
  .rank-val { font-size:11px; font-weight:800; width:48px; text-align:right; flex-shrink:0; }

  .grade-count { width:28px; font-size:11px; font-weight:700; color:var(--dim); text-align:right; }

  .footer { margin-top:20px; padding:12px 0; border-top:1px solid var(--border); display:flex; justify-content:space-between; }
  .footer span { font-size:10px; color:var(--mute); }

  .hidden { display:none !important; }

// ─── STATE ──────────────────────────────────────────
let selBU = "전체", selOF = "전체", tf = "합계", tab = "overview";
let charts = {};

// ─── HELPERS ────────────────────────────────────────
function gradeClass(g){ return g ? ('badge-'+(g==='B+'?'Bp':g)) : ''; }
function rateClass(g){ return g ? ('rate-'+(g==='B+'?'Bp':g)) : ''; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function rateCell(v){
  if(v==null) return `<td style="padding:4px 5px;text-align:center;color:var(--mute);font-size:10px">-</td>`;
  const g=getGrade(v);
  return `<td class="${rateClass(g)}" style="padding:4px 5px;text-align:center;font-size:10px">${v.toFixed(1)}</td>`;
}

function badgeHtml(g){
  if(!g) return `<span style="color:var(--mute);font-size:10px">-</span>`;
  return `<span class="badge ${gradeClass(g)}">${g}</span>`;
}

function getFiltered(){
  let l = HOSP;
  if(selBU!=="전체") l=l.filter(x=>x.bu===selBU);
  if(selOF!=="전체") l=l.filter(x=>x.of===selOF);
  if(tf==="기존형") l=l.filter(x=>x.t==="기존");
  else if(tf==="튜닝형") l=l.filter(x=>x.t==="튜닝");
  return l;
}

function destroyCharts(){ Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}}); charts={}; }

// ─── RENDER FUNCTIONS ───────────────────────────────
function renderTypeFilters(){
  const el=document.getElementById('typeFilters');
  const types=[{k:"합계",label:"기존+튜닝"},{k:"기존형",label:"기존형"},{k:"튜닝형",label:"튜닝형"}];
  el.innerHTML=types.map(t=>{
    const cls = tf===t.k ? (t.k==="기존형"?"active-legacy":t.k==="튜닝형"?"active-tuning":"active-total") : "";
    return `<button class="type-btn ${cls}" data-tf="${t.k}">${t.label}</button>`;
  }).join('');
  el.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{ tf=b.dataset.tf; render(); }));
}

function renderBuNav(){
  const el=document.getElementById('buNav');
  const bus=["전체","서울1","서울2","지방1","지방2"];
  el.innerHTML=`<span class="bu-label">사업부</span>`+bus.map(b=>
    `<button class="bu-btn ${selBU===b?'active':''}" data-bu="${b}">${b}</button>`
  ).join('');
  el.querySelectorAll('.bu-btn').forEach(b=>b.addEventListener('click',()=>{ selBU=b.dataset.bu; selOF="전체"; render(); }));
}

function renderOfNav(){
  const el=document.getElementById('ofNav');
  if(selBU==="전체"){ el.innerHTML=''; return; }
  const offices=[...new Set(HOSP.filter(x=>x.bu===selBU).map(x=>x.of))].sort();
  el.innerHTML=`<span class="of-label">사무소</span>`
    +`<button class="of-btn ${selOF==="전체"?'active':''}" data-of="전체">전체</button>`
    +offices.map(o=>
      `<button class="of-btn ${selOF===o?'active':''}" data-of="${o}">${o}</button>`
    ).join('');
  el.querySelectorAll('.of-btn').forEach(b=>b.addEventListener('click',()=>{ selOF=b.dataset.of; render(); }));
}

function renderKpis(){
  const filtered=getFiltered();
  const a=calcAgg(filtered);
  const titleLabel=(selBU!=="전체"?selBU:"전체")+(selOF!=="전체"?" > "+selOF:"");

  let contracts, totalBeds, cumAvg;
  if(selOF!=="전체"){
    // 사무소 선택 시 필터된 데이터에서 직접 계산
    contracts=a.count;
    totalBeds=a.beds;
    const allWithCa=filtered.filter(x=>x.ca!=null);
    cumAvg=allWithCa.length?allWithCa.reduce((s,x)=>s+x.ca,0)/allWithCa.length:0;
  } else {
    const s=SUM.find(x=>x.bu===(selBU!=="전체"?selBU:"전체")&&x.type===tf)||SUM.find(x=>x.bu==="전체"&&x.type==="합계");
    contracts=s?s.ct:a.count;
    totalBeds=s?s.tb:a.beds;
    cumAvg=s?s.ca:0;
  }
  const kpi={...a,contracts,totalBeds,cumAvg};

  const marColor = kpi.mar>=40?'var(--green)':kpi.mar>=25?'var(--amber)':'var(--red)';
  const deltaHtml = kpi.delta!=null
    ? `<div class="kpi-delta ${kpi.delta>=0?'up':'down'}">${kpi.delta>=0?"▲":"▼"} ${Math.abs(kpi.delta).toFixed(1)}%p vs 2월</div>`
    : '';

  document.getElementById('kpiRow').innerHTML=`
    <div class="kpi">
      <div class="kpi-label">3월 가동률</div>
      <div class="kpi-value" style="color:${marColor}">${kpi.mar!=null?kpi.mar.toFixed(1)+"%":"-"}</div>
      ${deltaHtml}
    </div>
    <div class="kpi">
      <div class="kpi-label">계약 처수</div>
      <div class="kpi-value">${kpi.contracts}</div>
      <div class="kpi-sub">가동 ${kpi.active}개 처</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">누계 병상수</div>
      <div class="kpi-value">${kpi.totalBeds.toLocaleString()}</div>
      <div class="kpi-sub">가동 ${kpi.beds.toLocaleString()} 병상</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">누적 평균</div>
      <div class="kpi-value" style="color:var(--amber)">${kpi.cumAvg.toFixed(1)}%</div>
      <div class="kpi-sub">${titleLabel} · ${tf}</div>
    </div>
  `;
}

function renderTabs(){
  const el=document.getElementById('tabs');
  const tabs=[["overview","종합 현황"],["trend","월별 추이"],["hospitals","거래처 상세"]];
  el.innerHTML=tabs.map(([k,l])=>
    `<button class="tab-btn ${tab===k?'active':''}" data-tab="${k}">${l}</button>`
  ).join('');
  el.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>{ tab=b.dataset.tab; renderContent(); renderTabs(); }));
}

function renderContent(){
  destroyCharts();
  const el=document.getElementById('tabContent');
  if(tab==="overview") renderOverview(el);
  else if(tab==="trend") renderTrend(el);
  else renderHospitals(el);
}

// ─── OVERVIEW TAB ───────────────────────────────────
function renderOverview(el){
  const filtered=getFiltered();
  const titleLabel=(selBU!=="전체"?selBU:"전체")+(selOF!=="전체"?" > "+selOF:"");

  // SubTable data
  let subTableHtml='';
  if(selBU==="전체"){
    const bus=["서울1","서울2","지방1","지방2"];
    const rows=bus.map(bu=>{
      let l=HOSP.filter(x=>x.bu===bu);
      if(tf==="기존형") l=l.filter(x=>x.t==="기존");
      else if(tf==="튜닝형") l=l.filter(x=>x.t==="튜닝");
      if(!l.length) return null;
      return {label:bu,...calcAgg(l)};
    }).filter(Boolean);
    subTableHtml=buildSubTable(`사업부별 현황 (${titleLabel} · ${tf})`,rows,"bu");
  } else if(selOF!=="전체"){
    // 사무소 선택 시: 해당 사무소 내 병원별 현황
    const hospRows=filtered.map(x=>{
      const wM=x.r[7]!=null?[x]:[];
      const wF=x.r[6]!=null?[x]:[];
      return {label:x.h,count:1,beds:x.b,active:wM.length,mar:x.r[7],feb:x.r[6],
        delta:(x.r[7]!=null&&x.r[6]!=null)?x.r[7]-x.r[6]:null};
    });
    subTableHtml=buildSubTable(`병원별 현황 (${titleLabel} · ${tf})`,hospRows,"hosp");
  } else {
    let l=HOSP.filter(x=>x.bu===selBU);
    if(tf==="기존형") l=l.filter(x=>x.t==="기존");
    else if(tf==="튜닝형") l=l.filter(x=>x.t==="튜닝");
    const offices=[...new Set(l.map(x=>x.of))].sort();
    const rows=offices.map(of=>({label:of,...calcAgg(l.filter(x=>x.of===of))}));
    subTableHtml=buildSubTable(`사무소별 현황 (${selBU} · ${tf})`,rows,"of");
  }

  // Grade dist
  const gCounts={S:0,A:0,"B+":0,B:0,C:0};
  filtered.forEach(x=>{ const g=getGrade(x.r[7]); if(g) gCounts[g]++; });
  const totalG=Object.values(gCounts).reduce((a,b)=>a+b,0);

  // Top/Bottom
  const withMar=filtered.filter(x=>x.r[7]!=null).sort((a,b)=>b.r[7]-a.r[7]);
  const top10=withMar.slice(0,10), bot10=withMar.slice(-10).reverse();

  // BU comparison
  let buCmpHtml='';
  if(selBU==="전체"){
    buCmpHtml=`<div class="card"><div class="card-title-sm">사업부별 2월 vs 3월</div><div class="chart-container"><canvas id="chartBuCmp" height="220"></canvas></div></div>`;
  }

  el.innerHTML=`
    <div class="flex-col">
      ${subTableHtml}
      <div class="grid-2">
        <div class="card">
          <div class="card-title-sm">월별 가동률 추이 (${titleLabel})</div>
          <div class="chart-container"><canvas id="chartTrendMini" height="220"></canvas></div>
        </div>
        <div class="card">
          <div class="card-title-sm">3월 등급 분포 (${filtered.filter(x=>x.r[7]!=null).length}개 처)</div>
          <div style="display:flex;align-items:center;gap:12px">
            <div style="width:45%"><canvas id="chartPie" height="200"></canvas></div>
            <div style="flex:1">
              ${["S","A","B+","B","C"].map(g=>{
                const cnt=gCounts[g]||0;
                const pct=totalG?(cnt/totalG*100):0;
                return `<div class="grade-row">
                  <span class="grade-label" style="color:${GC[g]}">${g}</span>
                  <div class="grade-bar-bg"><div class="grade-bar-fill" style="width:${pct}%;background:${GC[g]}"></div></div>
                  <span class="grade-count">${cnt}</span>
                </div>`;
              }).join('')}
            </div>
          </div>
        </div>
        ${buCmpHtml}
        <div class="card ${selBU!=='전체'||selOF!=='전체'?'grid-span':''}">
          <div class="rank-grid-mobile" style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
            <div>
              <div style="font-size:12px;font-weight:700;margin-bottom:10px;color:var(--green)">▲ Top 10 (3월)</div>
              ${top10.map((x,i)=>rankItemHtml(x,i,true)).join('')}
            </div>
            <div>
              <div style="font-size:12px;font-weight:700;margin-bottom:10px;color:var(--red)">▼ Bottom 10 (3월)</div>
              ${bot10.map((x,i)=>rankItemHtml(x,i,false)).join('')}
            </div>
          </div>
        </div>
      </div>
    </div>
  `;

  // Charts
  buildTrendChart('chartTrendMini',220,true);
  buildPieChart('chartPie',gCounts);
  if(selBU==="전체") buildBuCmpChart('chartBuCmp');
}

function buildSubTable(title,rows,labelKey){
  return `<div class="card">
    <div style="padding:0 0 10px;font-size:13px;font-weight:700;border-bottom:1px solid var(--blight)">${title}</div>
    <table>
      <thead><tr>
        <th class="left" style="font-size:10px">${labelKey==="bu"?"사업부":labelKey==="hosp"?"병원명":"사무소"}</th>
        <th style="font-size:10px">처수</th><th style="font-size:10px">병상</th><th style="font-size:10px">가동</th>
        <th style="font-size:10px">3월</th><th style="font-size:10px">2월</th><th style="font-size:10px">변동</th><th style="font-size:10px">등급</th>
      </tr></thead>
      <tbody>
        ${rows.map(row=>{
          const g=getGrade(row.mar);
          const deltaColor=row.delta!=null?(row.delta>=0?'var(--green)':'var(--red)'):'var(--mute)';
          const deltaText=row.delta!=null?((row.delta>=0?"+":"")+row.delta.toFixed(1)):"-";
          return `<tr class="row-border">
            <td class="td-left" style="font-weight:600;font-size:12px">${esc(row.label)}</td>
            <td style="color:var(--dim)">${row.count}</td>
            <td style="color:var(--dim)">${row.beds.toLocaleString()}</td>
            <td style="color:var(--dim)">${row.active}</td>
            <td class="${rateClass(g)}" style="border-radius:4px">${row.mar!=null?row.mar.toFixed(1)+"%":"-"}</td>
            <td style="color:var(--dim)">${row.feb!=null?row.feb.toFixed(1)+"%":"-"}</td>
            <td style="font-weight:700;color:${deltaColor}">${deltaText}</td>
            <td>${badgeHtml(g)}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`;
}

function rankItemHtml(x,i,isTop){
  const color=isTop?'var(--green)':'var(--red)';
  const bg=isTop?(i<3?'#dcfce7':'#f1f5f9'):'#fef2f2';
  const numColor=isTop?(i<3?'var(--green)':'var(--mute)'):'var(--red)';
  const tagCls=x.t==="기존"?"tag-legacy":"tag-tuning";
  return `<div class="rank-item">
    <span class="rank-num" style="background:${bg};color:${numColor}">${i+1}</span>
    <span class="rank-name">${esc(x.h)}</span>
    <span class="rank-bu">${esc(x.bu)}</span>
    <span class="tag ${tagCls}">${esc(x.t)}</span>
    <span class="rank-val" style="color:${color}">${x.r[7]!=null?x.r[7].toFixed(1)+"%":"-"}</span>
    ${badgeHtml(getGrade(x.r[7]))}
  </div>`;
}

// ─── CHART BUILDERS ─────────────────────────────────
function buildTrendChart(canvasId, height, mini){
  const labels=MS;
  const datasets=[];

  if(selOF!=="전체"){
    // 사무소 선택: 필터된 병원 데이터에서 월별 평균 직접 계산
    const filtered=getFiltered();
    const typeGroups = tf==="합계"
      ? [["합계",filtered],["기존형",filtered.filter(x=>x.t==="기존")],["튜닝형",filtered.filter(x=>x.t==="튜닝")]]
      : [[tf,filtered]];

    typeGroups.forEach(([type,list])=>{
      if(!list.length) return;
      const monthData=MS.map((_,i)=>{
        const w=list.filter(x=>x.r[i]!=null);
        return w.length?w.reduce((a,x)=>a+x.r[i],0)/w.length:null;
      });
      const color=type==="합계"?"#2563eb":type==="기존형"?"#0891b2":"#7c3aed";
      const isMain=type===tf;
      datasets.push({
        label:type, data:monthData, borderColor:color, backgroundColor:color+'22',
        borderWidth:tf==="합계"?(type==="합계"?3:1.5):(isMain?3:0),
        borderDash:tf==="합계"&&type!=="합계"?[5,3]:[],
        pointRadius:(tf==="합계"&&type==="합계")||isMain?4:0,
        pointBackgroundColor:color, tension:0.3, spanGaps:true,
        hidden:tf!=="합계"&&type!==tf,
      });
    });
  } else {
    // 사업부 전체 또는 전체: SUM 데이터 사용
    const bu=selBU!=="전체"?selBU:"전체";
    ["합계","기존형","튜닝형"].forEach(type=>{
      const s=SUM.find(x=>x.bu===bu&&x.type===type);
      if(!s) return;
      const color=type==="합계"?"#2563eb":type==="기존형"?"#0891b2":"#7c3aed";
      const isMain=type===tf;
      const show=tf==="합계"||(type===tf);
      datasets.push({
        label:type, data:s.m.map(v=>v), borderColor:color, backgroundColor:color+'22',
        borderWidth:tf==="합계"?(type==="합계"?3:1.5):(isMain?3:0),
        borderDash:tf==="합계"&&type!=="합계"?[5,3]:[],
        pointRadius:(tf==="합계"&&type==="합계")||isMain?4:0,
        pointBackgroundColor:color, tension:0.3, spanGaps:true,
        hidden:!show&&tf!=="합계",
      });
    });
  }

  const ctx=document.getElementById(canvasId);
  if(!ctx) return;
  charts[canvasId]=new Chart(ctx,{
    type:'line',
    data:{labels,datasets},
    options:{
      responsive:true,
      maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{labels:{font:{size:11},usePointStyle:true,pointStyle:'circle'}},
        tooltip:{
          backgroundColor:'#0f172a',titleColor:'#94a3b8',bodyColor:'#f1f5f9',
          borderColor:'#334155',borderWidth:1,cornerRadius:10,
          callbacks:{label:ctx=>ctx.parsed.y!=null?ctx.dataset.label+': '+ctx.parsed.y.toFixed(1)+'%':ctx.dataset.label+': -'}
        },
      },
      scales:{
        y:{beginAtZero:true,ticks:{font:{size:10},color:'#94a3b8',callback:v=>v+'%'},
          grid:{color:'#e2e8f0'}},
        x:{ticks:{font:{size:mini?10:11},color:'#475569'},grid:{display:false}}
      },
      animation:{duration:400}
    }
  });
}

function buildPieChart(canvasId,gCounts){
  const grades=["S","A","B+","B","C"];
  const data=grades.map(g=>gCounts[g]||0);
  const colors=grades.map(g=>GC[g]);
  const ctx=document.getElementById(canvasId);
  if(!ctx) return;
  charts[canvasId]=new Chart(ctx,{
    type:'doughnut',
    data:{labels:grades,datasets:[{data,backgroundColor:colors,borderWidth:2,borderColor:'#fff'}]},
    options:{
      responsive:true,
      cutout:'55%',
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'#0f172a',titleColor:'#94a3b8',bodyColor:'#f1f5f9',
          borderColor:'#334155',borderWidth:1,cornerRadius:10,
        }
      },
      animation:{duration:400}
    }
  });
}

function buildBuCmpChart(canvasId){
  const bus=["서울1","서울2","지방1","지방2"];
  const data=bus.map(bu=>{
    const s=SUM.find(x=>x.bu===bu&&x.type===tf);
    if(!s) return{bu,feb:0,mar:0};
    return{bu,feb:s.m[6],mar:s.m[7]};
  });

  const ctx=document.getElementById(canvasId);
  if(!ctx) return;
  charts[canvasId]=new Chart(ctx,{
    type:'bar',
    data:{
      labels:bus,
      datasets:[
        {label:'2월',data:data.map(d=>d.feb),backgroundColor:'#cbd5e1',borderRadius:4,barPercentage:0.5},
        {label:'3월',data:data.map(d=>d.mar),
          backgroundColor:data.map(d=>d.mar>=d.feb?'#16a34a':'#dc2626'),borderRadius:4,barPercentage:0.5}
      ]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{
        legend:{labels:{font:{size:11},usePointStyle:true,pointStyle:'circle'}},
        tooltip:{
          backgroundColor:'#0f172a',titleColor:'#94a3b8',bodyColor:'#f1f5f9',
          borderColor:'#334155',borderWidth:1,cornerRadius:10,
          callbacks:{label:ctx=>ctx.dataset.label+': '+(ctx.parsed.y!=null?ctx.parsed.y.toFixed(1):0)+'%'}
        }
      },
      scales:{
        y:{beginAtZero:true,ticks:{font:{size:10},color:'#94a3b8',callback:v=>v+'%'},grid:{color:'#e2e8f0'}},
        x:{ticks:{font:{size:11},color:'#475569'},grid:{display:false}}
      },
      animation:{duration:400}
    }
  });
}

function render(){
  renderTypeFilters();
  renderBuNav();
  renderOfNav();
  renderKpis();
  renderTabs();
  renderContent();
}

render();
